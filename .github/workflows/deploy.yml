name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      install_source:
        description: 'Install okaasan from PyPI or from git (latest source)'
        required: false
        default: 'git'
        type: choice
        options:
          - pypi
          - git

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout data repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Install Okaasan (PyPI)
      if: ${{ github.event.inputs.install_source == 'pypi' }}
      run: pip install okaasan

    - name: Install Okaasan (git source)
      if: ${{ github.event.inputs.install_source != 'pypi' }}
      run: |
        git clone https://github.com/Delaunay/okaasan /tmp/okaasan-src
        pip install -e /tmp/okaasan-src

    - name: Build static website
      run: |
        okaasan static \
          --output "${{ github.workspace }}/static_build" \
          --base_path "/website/" \
          --api_url "/website/api"
      env:
        OKAASAN_DATA: ${{ github.workspace }}

    - name: Setup Pages
      uses: actions/configure-pages@v3

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./static_build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
